# 条件判断
- name: 条件判断
  block:
  # 最基本的 if...else...
  - name: if_else
    template:
      src: "{{ item.src }}"
      dest: "{{ item.dest }}"
      lstrip_blocks: true
      trim_blocks: true
    with_items:
    - {src: './if_else_and_operator.jinja',dest: '/tmp/if_else_and_operator.conf'}
    tags:
    - if_else
  # 使用 is 关键字进行测试
  - name: 测试变量 isVar 是不是字符串
    vars:
      isVar: "1234567890"
    debug:
      msg: "string"
    when: isVar is string
  - name: 测试变量中是否包含某些字符
    vars:
      name: "DesistDaydream"
    debug:
      msg: "{{ name }}"
    when: name is regex("D|A")

# 过滤器
- name: filters
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    lstrip_blocks: true
    trim_blocks: true
  with_items:
  - {src: './filters.jinja',dest: '/tmp/filters.conf'}
  tags:
  - filters

# 继承
- name: extends
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    lstrip_blocks: true
    trim_blocks: true
  with_items:
  - {src: './extends.jinja',dest: '/tmp/extends.conf'}
  tags:
  - extends


